name: CI
on:
  push:
    branches:
      - release/*
      - develop
      - master
      - main
  pull_request: {}

permissions:
  id-token: write
  contents: write
  actions: read
  pull-requests: write
  issues: write

env:
  CLUSTER_KEY: ${{ secrets.CLUSTER_KEY }}
  PYTHONUNBUFFERED: 1

jobs:
  ci:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # ratchet:actions/checkout@v6.0.1
        with:
          fetch-depth: 2

      - name: Install Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # ratchet:actions/setup-python@v6.1.0
        with:
          python-version: "3.14"

      - name: Setup mise
        uses: jdx/mise-action@146a28175021df8ca24f8ee1828cc2a60f980bd5 # ratchet:jdx/mise-action@v3.5.1
        with:
          install: true
          cache: true
          experimental: true

      - name: Run CI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SECRET_ENV: ${{ secrets.DEPLOY_KEY }}
        run: |
          echo "$SECRET_ENV" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          GIT_SSH_COMMAND="ssh -i /tmp/deploy_key -o StrictHostKeyChecking=accept-new" git clone git@github.com:uptick/splat-private.git
          rm /tmp/deploy_key
          mise run ci
